# systemd drop-in: cgroup memory cap for Elasticsearch.
#
# Belt-and-suspenders to the heap pin in jvm.options.d/heap.options. Even if the
# JVM heap + off-heap + page-cache misbehaves, ES gets killed in its own cgroup
# instead of triggering a global OOM that takes down the rest of the box.
#
# With -Xmx1g, total ES RSS (heap + metaspace + threads + direct buffers) sits
# around 1.3-1.8 GB, so 2 GB is a safe ceiling.
#
# INSTALL on the server:
#   sudo mkdir -p /etc/systemd/system/elasticsearch.service.d
#   sudo cp deploy/elasticsearch-override.conf /etc/systemd/system/elasticsearch.service.d/override.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart elasticsearch

[Service]
MemoryAccounting=yes
MemoryMax=2G
MemoryHigh=1800M
